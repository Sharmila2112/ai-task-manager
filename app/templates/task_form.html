{% extends "base.html" %}
{% block title %}{% if task %}Edit Task{% else %}New Task{% endif %}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4">{% if task %}Edit Task{% else %}New Task{% endif %}</h2>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label" for="title">Title</label>
                <input
                    type="text" class="form-control" id="title" name="title"
                    value="{{ task.title if task else '' }}" required
                >
            </div>
            <div class="mb-3">
                <label class="form-label" for="description">Description</label>
                <textarea class="form-control" id="description" name="description" rows="3">{{ task.description if task else '' }}</textarea>
            </div>
            <div class="mb-3">
                <label class="form-label" for="category">Category</label>
                <input
                    type="text" class="form-control" id="category" name="category"
                    value="{{ task.category if task else 'General' }}"
                >
            </div>
            <div class="mb-3">
                <label class="form-label" for="priority">Priority</label>
                <select class="form-select" id="priority" name="priority">
                    {% for p in priorities %}
                        <option value="{{ p }}" {% if task and task.priority == p %}selected{% elif not task and p == 'Medium' %}selected{% endif %}>
                            {{ p }}
                        </option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn btn-primary">
                {% if task %}Save Changes{% else %}Create Task{% endif %}
            </button>
            <a href="{{ url_for('tasks.index') }}" class="btn btn-outline-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
